<!DOCTYPE html>
<html>
<head>
    <title>Flask API Frontend</title>
</head>
<body>

    <h1>Item Management</h1>

    <!-- Get All Items -->
    <h2>All Items</h2>
    <button onclick="getItems()">Load Items</button>
    <ul id="itemList"></ul>

    <hr>

    <!-- Get Item by ID -->
    <h2>Get Item By ID</h2>
    <input type="number" id="itemId" placeholder="Enter Item ID">
    <button onclick="getItem()">Get Item</button>
    <p id="singleItem"></p>

    <hr>

    <!-- Add New Item -->
    <h2>Add New Item</h2>
    <input type="text" id="name" placeholder="Item Name">
    <input type="number" id="price" placeholder="Item Price">
    <button onclick="addItem()">Add Item</button>

    <script>
        // Get all items
        function getItems() {
            fetch('/api/items')
            .then(response => response.json())
            .then(data => {
                let list = document.getElementById("itemList");
                list.innerHTML = "";
                data.forEach(item => {
                    let li = document.createElement("li");
                    li.innerText = `ID: ${item.id}, Name: ${item.name}, Price: ${item.price}`;
                    list.appendChild(li);
                });
            });
        }

        // Get single item
        function getItem() {
            let id = document.getElementById("itemId").value;
            fetch(`/api/items/${id}`)
            .then(response => response.json())
            .then(data => {
                document.getElementById("singleItem").innerText =
                    JSON.stringify(data);
            });
        }

        // Add new item
        function addItem() {
            let name = document.getElementById("name").value;
            let price = document.getElementById("price").value;

            fetch('/api/items', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    name: name,
                    price: price
                })
            })
            .then(response => response.json())
            .then(data => {
                alert("Item Added Successfully!");
                getItems();
            });
        }
    </script>

</body>
</html>
